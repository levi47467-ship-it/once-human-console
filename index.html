<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七日世界 - 終端行動控制台 V5.6.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a1122;
            --card-bg: #11192e;
            --accent-color: #34ead6;
            --text-color: #f1f5f9;
            --header-color: #94a3b8;
            --sub-accent: #60a5fa;
            --tab-inactive: #1a253a;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Orbitron', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #boot-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease-out;
        }

        .boot-text-wrapper { text-align: left; border-left: 3px solid var(--accent-color); padding-left: 20px; }
        #name-input-area { display: none; margin-top: 20px; text-align: center; }

        .cyber-input {
            background: rgba(52, 234, 214, 0.1); border: 1px solid var(--accent-color);
            color: white; padding: 10px; font-family: inherit; border-radius: 4px; outline: none; margin-right: 10px;
        }

        .cyber-btn {
            background: var(--accent-color); color: var(--bg-color); border: none;
            padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px;
        }

        .container {
            width: 100%; max-width: 1100px; background: var(--card-bg); padding: 35px;
            border-radius: 16px; box-shadow: 0 0 30px rgba(52, 234, 214, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05); opacity: 0;
            transition: opacity 1.5s ease-in; pointer-events: none;
        }

        .container.show { opacity: 1; pointer-events: auto; }

        h1 {
            text-align: center; font-size: 2.2rem; color: var(--accent-color);
            margin-bottom: 30px; letter-spacing: 6px; text-shadow: 0 0 15px rgba(52, 234, 214, 0.5);
            font-weight: 700;
        }

        .top-right-notice {
            position: absolute; top: 0; right: 0;
        }

        .system-mini-notice {
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem;
            color: var(--header-color); letter-spacing: 1px;
            animation: notice-blink 3s infinite;
        }

        .system-mini-notice.completed {
            animation: none;
            opacity: 0.8;
        }

        @keyframes notice-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .system-mini-notice .notice-dot {
            width: 6px; height: 6px; background: var(--accent-color);
            border-radius: 50%; box-shadow: 0 0 8px var(--accent-color);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-banner-mini {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(17, 25, 46, 0.9);
            border-left: 4px solid var(--accent-color);
            padding: 12px 20px; border-radius: 4px;
            z-index: 100; backdrop-filter: blur(5px);
            box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
        }

        .welcome-title { font-size: 1rem; font-weight: bold; color: var(--accent-color); margin-bottom: 2px; }
        .welcome-sub { font-size: 0.8rem; color: #888; letter-spacing: 1px; }
        @keyframes blink { 50% { opacity: 0; } }

        .tabs {
            display: flex; gap: 8px; margin-bottom: 30px; border-bottom: 2px solid var(--tab-inactive);
            overflow-x: auto; padding-bottom: 5px;
        }

        .tab-btn {
            padding: 14px 24px; background: transparent; border: none; color: var(--header-color);
            cursor: pointer; font-weight: bold; font-family: inherit; font-size: 0.9rem;
            transition: 0.3s; white-space: nowrap; position: relative;
        }

        .tab-btn.active { color: var(--accent-color); background: rgba(52, 234, 214, 0.05); }
        .tab-btn.active::after {
            content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px;
            background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .summary-board {
            background: rgba(52, 234, 214, 0.05); padding: 15px 20px; border-radius: 12px;
            margin-bottom: 25px; border: 1px dashed var(--accent-color);
        }

        .group-title {
            font-size: 1.3rem; color: var(--accent-color); margin: 25px 0 15px 0;
            font-weight: bold; border-left: 4px solid var(--accent-color); padding-left: 15px;
        }

        .sub-options-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px; padding: 5px 0 20px 15px;
        }

        .todo-item {
            display: flex; align-items: center; padding: 12px 15px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }

        .todo-item:hover { background: rgba(52, 234, 214, 0.06); border-color: rgba(52, 234, 214, 0.3); }
        input[type="checkbox"] { margin-right: 12px; width: 18px; height: 18px; accent-color: var(--accent-color); }
        
        .footer-tools {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reset-btn {
            padding: 10px 25px; background: transparent; border: 1px solid var(--danger);
            color: var(--danger); border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .reset-btn:hover { background: var(--danger); color: white; }

        select, .dev-input {
            height: 45px; font-size: 1rem; background: #1a253a; border: 1px solid var(--accent-color);
            color: white; border-radius: 6px; padding: 0 10px; width: 100%; box-sizing: border-box;
        }

        #dev-select { height: 150px !important; }

        .log-card {
            background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px;
            margin-bottom: 12px; border-left: 5px solid var(--sub-accent); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .log-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .log-tag { background: rgba(52, 234, 214, 0.1); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; color: var(--accent-color); }

        .cd-warning-panel { font-size: 0.85rem; color: var(--warning); margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
        .camp-counter { font-size: 0.8rem; text-align: right; margin-bottom: 5px; color: var(--header-color); }
        .camp-counter b { color: var(--accent-color); }

        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; color: var(--text-color); }
        .log-table th { text-align: left; padding: 10px; border-bottom: 2px solid var(--accent-color); color: var(--accent-color); }
        .log-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .cd-item {
            color: var(--header-color); font-size: 0.85rem; padding: 10px;
            background: rgba(255,255,255,0.03); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cd-time { color: var(--warning); font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="boot-loader">
    <div class="boot-text-wrapper">
        <div id="boot-greet" class="welcome-title" style="font-size: 2.2rem; margin-bottom: 10px;">SYSTEM BOOTING...</div>
        <div id="boot-sub" class="welcome-sub" style="font-size: 1.1rem; color: var(--accent-color);">Waiting for user identity...</div>
        <div id="name-input-area">
            <input type="text" id="user-name-field" class="cyber-input" placeholder="輸入超越者代號...">
            <button onclick="confirmIdentity()" class="cyber-btn">確認身份</button>
        </div>
    </div>
</div>

<div id="status-banner-mini" class="status-banner-mini"></div>

<div class="container">
    <div style="position: relative;">
        <h1>終端行動控制台</h1>
        <div id="alert-slot-top" class="top-right-notice"></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'daily')">每日/周常</button>
        <button class="tab-btn" onclick="openTab(event, 'resources')">大型資源點</button>
        <button class="tab-btn" onclick="openTab(event, 'furniture')">家具工坊</button>
        <button class="tab-btn" onclick="openTab(event, 'deviants')">異常物一覽</button>
    </div>

    <div id="daily" class="tab-content active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <div class="group-title">每日上線</div>
                <div class="sub-options-grid" style="grid-template-columns: 1fr;">
                    <label class="todo-item"><input type="checkbox"> 整理背包 / 領地儲存</label>
                    <label class="todo-item"><input type="checkbox"> 餵食動物 / 植物澆水</label>
                    <label class="todo-item"><input type="checkbox"> 3次公共事件 (拿控制器)</label>
                </div>
            </div>
            <div>
                <div class="group-title">重要周常</div>
                <div id="weekly-list-container" class="sub-options-grid" style="grid-template-columns: 1fr;"></div>
                <div id="weekly-cd-container" style="display: flex; flex-direction: column; gap: 8px; padding-left: 15px;"></div>
            </div>
        </div>

        <div style="width: 100%; margin-top: 20px;">
            <div class="group-title">營地收容登記</div>
            <div class="summary-board" style="padding: 20px;">
                <div id="reg-area">
                    <div style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom:8px; color:var(--accent-color);">🔍 1. 搜尋異常物名稱</label>
                        <input type="text" id="dev-search" class="dev-input" placeholder="輸入關鍵字...">
                        <select id="dev-select" style="margin-top:5px;" size="6"></select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <div><label style="display:block; font-size:0.8rem; margin-bottom:5px;">品質</label><select id="input-quality"><option>普通</option><option>異色</option></select></div>
                        <div><label style="display:block; font-size:0.8rem; margin-bottom:5px;">類型</label><select id="input-type"><option>領地</option><option>造物</option><option>戰鬥</option></select></div>
                        <div><label style="display:block; font-size:0.8rem; margin-bottom:5px;">異能評級</label><select id="input-power"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
                        <div><label style="display:block; font-size:0.8rem; margin-bottom:5px;">活力評級</label><select id="input-active"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
                    </div>
                    <div id="camp-select-wrapper" style="margin-bottom: 15px;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:5px;">收容地點</label>
                        <select id="input-location"></select>
                    </div>
                </div>
                <div id="camp-counter" class="camp-counter"></div>
                <button id="save-btn" onclick="saveDevantLog()" style="width:100%; height:50px; background:var(--accent-color); color:#0a1122; border:none; border-radius:8px; font-size:1.1rem; font-weight:bold; cursor:pointer;">
                    ➕ 保存本次收容紀錄
                </button>
                <div id="cd-status" class="cd-warning-panel"></div>
            </div>

            <div class="group-title">📋 收容日誌概覽</div>
            <div class="summary-board" style="padding: 0; overflow: hidden;">
                <table class="log-table">
                    <thead>
                        <tr><th>時間</th><th>名稱</th><th>地點</th><th>異/活</th></tr>
                    </thead>
                    <tbody id="log-table-body"></tbody>
                </table>
            </div>
            <div id="log-list"></div>
        </div>
    </div>

    <div id="resources" class="tab-content">
        <div class="group-title">地圖掃蕩清單</div>
        <div class="sub-options-grid">
            <label class="todo-item"><input type="checkbox"> 岱頓濕地各據點</label>
        </div>
    </div>

    <div id="furniture" class="tab-content">
        <div class="group-title">家具工坊</div>
        <div id="total-materials" class="summary-board">
            ✨ 星塵: <b>0</b> | 🛠️ 鋼錠: <b>0</b>
        </div>
    </div>

    <div id="deviants" class="tab-content">
        <div class="group-title">異常物一覽</div>
    </div>

    <div class="footer-tools">
        <div style="color: var(--header-color); font-size: 0.8rem;">OS: V5.6.3 / 已修正文字閃爍速度與 CD 重置</div>
        <button onclick="clearIdentity()" style="font-size:0.85rem; color:#ff4444; font-weight:bold; background:none; border:none; cursor:pointer;">[ 重置身份名稱 ]</button>
        <button class="reset-btn" onclick="resetList()">全部重置</button>
    </div>
</div>

<script>
    const CAMPS = ["旅人營地", "麥爾集市", "深草旅店", "穢水營地", "黑原鎮"];
    const WEEKLY_TASKS = [
        { id: 'purify', label: '領地淨化 (每週 40/40)' },
        { id: 'camp_quest', label: '營地委託任務 (每週 5/5)' },
        { id: 'mitsubishi', label: '三菱子幣物資兌換' },
        { id: 'salt_battery', label: '商人電池兌換 (賣鹽/汽水)' }
    ];
    const allNames = ["遠歸之蝶","遠歸之蝶-浮光藍","遠歸之蝶-星月夜","遠歸之蝶-故紙","迪斯可球","迪斯可球-次聲幻象","極寒水母","極寒水母-逆軌星臨","極寒水母-輝光異種","發條青蛙","電鰻","電鰻-次聲幻象","電鰻-月之預兆","電鰻-金色閃電","氣球狗","氣球狗-次聲幻象","氣球狗-金色閃電","活性凝膠","活性凝膠-次聲幻象","活性凝膠-春薔薇","活性凝膠-海藍星","活性凝膠-奶糖","活性凝膠-月之預兆","榮枯種子","捕夢網","低語孤狼","低語孤狼-爆裂熔火","低語孤狼-遠星遺淚","低語孤狼-月之預兆","低語孤狼-輝光異種","空間魔方","空間魔方-次聲幻象","空間魔方-白崖殘岩","乖乖兔","乖乖兔-次聲幻象","乖乖兔-愛麗絲","乖乖兔-叛逆黑","乖乖兔-水瓶座","乖乖兔-饕餮兔","熊醫生","熊醫生-次聲幻象","熊醫生:聖誕精靈","熊醫生-異異異變共棲","蜂團團","蜂團團-南瓜燈","蜂團團-燈花有餘","青龍","青龍-狂野","青龍-聖誕精靈","青龍-藍色音浪","工號37","工號37-次聲幻象","工號37-原型機","工號37-夢域","薑餅屋","薑餅屋-次聲幻象","一碗美味","一碗美味-次聲幻象","核子打火機","核子打火機-次聲幻象","凝視的黑貓","凝視的黑貓-法老","凝視的黑貓-逆軌星臨","胡桃夾子","胡桃夾子-次聲幻象","胡桃夾子-錯位童話","胡桃夾子-木黃","胡桃夾子-正紫","胡桃夾子-海藍","胡桃夾子-錫兵","胡桃夾子-麗紫","胡桃夾子-雅紫","胡桃夾子-糖格衛兵","胡桃夾子-白銀紳士","胡桃夾子-交錯光影","胡桃夾子-黃金年代","胡桃夾上-海軍上將","胡桃夾子-耶誕節","胡桃夾子-鑽石伯爵","胡桃夾子-銅綠","胡桃夾子-棗褐","胡桃夾子-碧湖","胡桃夾子-綠野","木工河狸","木工河狸-聖誕精靈","元素小子","元素小子-純金","元素小子-梭彩","元素小子-綠寶石","元素小子-發財骰","元素小子-一方通行","紅龍","紅龍-混沌","紅龍-月之預兆","蝶之夢","蝶之夢-異異異變共棲","空之子","空之子-輝光","空之子-爆裂熔火","空之子-極寒之觸","空之子-月之預兆","聯合體","願望先生","願望先生-混沌","願望先生-青龍鬥士","惡臭球根","惡臭球根-紫衣","雪景球","雪景球-次聲幻象","雪景球-異異異變共棲","龐然大菇","龐然大菇-大加倍","龐然大菇-一見青","龐然大菇-幽蕈","龐然大菇-異異異變共棲","皆斬","皆斬-月之預兆","雨人","雨人-童趣","雨人-童心","雨人-光雨","雨人-異異異變共棲","門扉","量子蝸牛","量子蝸牛-月之預兆","量子蝸牛-金色閃電","派對猴","派對猴-次聲幻象","上界之卵","上界之卵-異異異變共棲","巫毒娃娃","巫毒娃娃-絨毛咒物","巫毒娃娃-逆軌星臨","炎之精","炎之精-王子","炎之精-金蟾","破碎少女","破碎少女-巡遊魔女","迷你奇點","迷你奇點-爆裂熔火","迷你奇點-逆軌星臨","混沌-迷你奇點","異維大貓","異維大貓-大喜大利","異維大貓-大橘為重","異維大貓-月亮鑽石","異維大貓-渾沌","球狀閃電","迷你黃衣","迷你黃衣-食星異魔","迷你黃衣-逆軌星臨","小紙人","小紙人-次聲幻象","小紙人-魔女愛物","奪命兔","匠師之手","焦油布丁","焦油布丁-輻輝","焦油布丁-佳釀","魚航員","魚航員-常綠","快照","快照-次聲幻象","快照-愚者之憶","快照-月之預兆","永恆烈陽","永恆列陽-次聲幻象","永恆烈陽-邪陽","永恆烈陽-逆軌星臨","冬靈","冬靈-返春","冬靈-渾沌","冬靈-月之預兆","冰之瓶","守夜燈","願望箱","願望箱-次聲幻象","願望箱-夢域","鯨狗","喚生靈","狐主任","電螈","黑醫","搗蛋貓","桃旋鼬","疾旋鼬","狼犬","杜賓","拉布拉多","勇士喬治"];

    let cdInterval = null;
    let weeklyInterval = null;
    let currentRandomTask = null; 

    function normalizeCampName(name) {
        if (!name) return "";
        return name.replace("邁", "麥").trim();
    }

    function getNextMondayReset() {
        const now = new Date();
        const result = new Date(now);
        result.setDate(now.getDate() + (7 - now.getDay() + 1) % 7 || 7);
        result.setHours(8, 0, 0, 0);
        if (now >= result) result.setDate(result.getDate() + 7);
        return result;
    }

    function getRandomTask() {
        const weeklyData = JSON.parse(localStorage.getItem('weekly-cd-v2') || '{}');
        const resetTime = getNextMondayReset();
        const lastReset = new Date(resetTime);
        lastReset.setDate(lastReset.getDate() - 7);

        const undoneTasks = WEEKLY_TASKS.filter(task => {
            const lastDone = weeklyData[task.id] ? new Date(weeklyData[task.id]) : null;
            return !(lastDone && lastDone >= lastReset);
        });

        // 如果還有未完成的，從未完成中隨機挑選；否則隨機挑選全部中的一個
        const pool = undoneTasks.length > 0 ? undoneTasks : WEEKLY_TASKS;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 修復：切換任務狀態後，主動檢查並更新隨機提醒文字
    function toggleWeeklyTask(id) {
        const weeklyData = JSON.parse(localStorage.getItem('weekly-cd-v2') || '{}');
        weeklyData[id] = new Date().toISOString();
        localStorage.setItem('weekly-cd-v2', JSON.stringify(weeklyData));
        
        // 重點：如果剛完成的是目前的提醒任務，則立即刷新隨機任務
        if (currentRandomTask && id === currentRandomTask.id) {
            currentRandomTask = getRandomTask();
        }
        
        updateWeeklyDisplay();
    }

    function updateWeeklyDisplay() {
        const listContainer = document.getElementById('weekly-list-container');
        const cdContainer = document.getElementById('weekly-cd-container');
        const topNotice = document.getElementById('alert-slot-top');
        const weeklyData = JSON.parse(localStorage.getItem('weekly-cd-v2') || '{}');
        const now = new Date();
        const resetTime = getNextMondayReset();

        listContainer.innerHTML = '';
        cdContainer.innerHTML = '';

        if (!currentRandomTask) {
            currentRandomTask = getRandomTask();
        }

        let taskStatus = { isDone: false, label: currentRandomTask.label };

        WEEKLY_TASKS.forEach(task => {
            const lastDone = weeklyData[task.id] ? new Date(weeklyData[task.id]) : null;
            let onCD = false;

            if (lastDone) {
                const lastReset = new Date(resetTime);
                lastReset.setDate(lastReset.getDate() - 7);
                if (lastDone >= lastReset) {
                    onCD = true;
                    if (task.id === currentRandomTask.id) taskStatus.isDone = true;
                }
            }

            if (onCD) {
                const diff = resetTime - now;
                const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                cdContainer.innerHTML += `
                    <div class="cd-item">
                        <span>✅ ${task.label}</span>
                        <span class="cd-time">${d}d ${h}h ${m}m ${s}s</span>
                    </div>`;
            } else {
                listContainer.innerHTML += `
                    <label class="todo-item">
                        <input type="checkbox" onchange="toggleWeeklyTask('${task.id}')"> ${task.label}
                    </label>`;
            }
        });

        // 更新頂部顯示
        if (taskStatus.isDone) {
            // 如果剛好完成了，文字會顯示已完成，並在下一秒透過 setInterval 切換成下一個（或由 toggle 觸發）
            topNotice.innerHTML = `
                <div class="system-mini-notice completed">
                    <div class="notice-dot" style="background:#888; box-shadow:none;"></div>
                    <span>任務完成：${taskStatus.label}</span>
                </div>`;
        } else {
            topNotice.innerHTML = `
                <div class="system-mini-notice">
                    <div class="notice-dot"></div>
                    <span>重要周常：${taskStatus.label} 是否完成？</span>
                </div>`;
        }
    }

    function confirmIdentity() {
        const nameField = document.getElementById('user-name-field');
        const name = nameField.value.trim();
        if (name) {
            localStorage.setItem('terminal-username', name);
            document.getElementById('name-input-area').style.display = 'none';
            startBootSequence(name);
        } else {
            alert("請輸入代號以同步系統。");
        }
    }

    function clearIdentity() {
        if(confirm("確定要清除記憶的名字嗎？下次啟動需要重新輸入。")) {
            localStorage.removeItem('terminal-username');
            location.reload();
        }
    }

    function showWelcomeMessage() {
        const storedName = localStorage.getItem('terminal-username');
        if (storedName) {
            startBootSequence(storedName);
        } else {
            document.getElementById('name-input-area').style.display = 'block';
        }
    }

    function startBootSequence(userName) {
        const hours = new Date().getHours();
        let greet = (hours >= 5 && hours < 11) ? "早安" : (hours >= 11 && hours < 17) ? "午安" : (hours >= 17 && hours < 22) ? "歡迎回來" : "深夜了";
        
        const welcomePool = ["所有分流監控正常，今日適合收容新物種。", "今日星塵濃度穩定，適合進行家具製作。", "系統同步完成，祝您今天獵殺愉快。"];
        const randomSub = welcomePool[Math.floor(Math.random() * welcomePool.length)];
        
        document.getElementById('boot-greet').innerText = `${greet}，超越者 ${userName}`;
        document.getElementById('boot-sub').innerHTML = `<span style="color: #00ff00; animation: blink 1s infinite;">●</span> ${randomSub}`;

        const bannerMini = document.getElementById('status-banner-mini'); 
        if (bannerMini) {
            bannerMini.innerHTML = `<div class="welcome-title">${greet}，超越者 ${userName}</div><div class="welcome-sub"><span style="color: #00ff00; animation: blink 1s infinite;">●</span> ${randomSub}</div>`;
        }

        currentRandomTask = getRandomTask();
        updateWeeklyDisplay();

        setTimeout(() => {
            document.getElementById('boot-loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-loader').style.display = 'none';
                document.querySelector('.container').classList.add('show');
            }, 1000);
        }, 2500);
    }

    function initDevSelect() {
        const searchInput = document.getElementById('dev-search');
        const select = document.getElementById('dev-select');
        function filterOptions(term) {
            select.innerHTML = '';
            allNames.filter(n => n.includes(term)).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.textContent = name;
                select.appendChild(opt);
            });
        }
        searchInput.addEventListener('input', (e) => filterOptions(e.target.value));
        filterOptions('');
    }

    function getNextResetTime(baseTime) {
        let resetTime = new Date(baseTime);
        resetTime.setHours(8, 0, 0, 0);
        if (baseTime >= resetTime) resetTime.setDate(resetTime.getDate() + 1);
        return resetTime;
    }

    function openTab(evt, tabName) {
        for (let c of document.getElementsByClassName("tab-content")) { c.style.display = "none"; c.classList.remove("active"); }
        for (let b of document.getElementsByClassName("tab-btn")) b.classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function updateCampSelect() {
        const campSelect = document.getElementById('input-location');
        const saveBtn = document.getElementById('save-btn');
        const cdStatus = document.getElementById('cd-status');
        const campCounter = document.getElementById('camp-counter');
        
        if (cdInterval) clearInterval(cdInterval);
        
        const refresh = () => {
            const cdTimestamps = JSON.parse(localStorage.getItem('camp-cd-timestamps') || '{}');
            const now = new Date();
            let activeCDsInfo = [];
            let availableCamps = [];
            
            CAMPS.forEach(camp => {
                const normCamp = normalizeCampName(camp);
                let ts = null;
                Object.keys(cdTimestamps).forEach(key => {
                    if (normalizeCampName(key) === normCamp) ts = cdTimestamps[key];
                });
                
                let isEffectiveCD = false;
                if (ts) {
                    const resetTime = getNextResetTime(new Date(ts));
                    const diff = resetTime - now;
                    if (diff > 0) {
                        isEffectiveCD = true;
                        const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                        activeCDsInfo.push(`<span>⏳ ${camp} (${h}h ${m}m ${s}s)</span>`);
                    }
                }
                if (!isEffectiveCD) availableCamps.push(camp);
            });

            cdStatus.innerHTML = activeCDsInfo.join('');
            campCounter.innerHTML = `目前剩餘：<b>${availableCamps.length} / ${CAMPS.length}</b> 個營地可登記`;

            const currentVal = campSelect.value;
            const currentOptions = Array.from(campSelect.options).map(o => o.value).filter(v => v !== "");
            
            if (JSON.stringify(currentOptions) !== JSON.stringify(availableCamps)) {
                campSelect.innerHTML = '<option value="" disabled selected>選擇收容地點...</option>';
                availableCamps.forEach(camp => {
                    const opt = document.createElement('option');
                    opt.value = camp; opt.textContent = camp;
                    campSelect.appendChild(opt);
                });
                if (availableCamps.includes(currentVal)) campSelect.value = currentVal;
            }

            if (availableCamps.length === 0) {
                saveBtn.disabled = true; saveBtn.textContent = "今日已達上限 (明日08:00重置)";
                saveBtn.style.background = "#4b5563"; 
            } else {
                saveBtn.disabled = false; saveBtn.textContent = "➕ 保存本次收容紀錄";
                saveBtn.style.background = "var(--accent-color)";
            }
        };

        refresh();
        cdInterval = setInterval(refresh, 1000);
    }

    function saveDevantLog() {
        const devSelect = document.getElementById('dev-select');
        const campSelect = document.getElementById('input-location');
        if(!devSelect.value || !campSelect.value) { alert('資訊不完整！'); return; }
        
        const now = new Date();
        const log = {
            name: devSelect.value, quality: document.getElementById('input-quality').value,
            type: document.getElementById('input-type').value, power: document.getElementById('input-power').value,
            active: document.getElementById('input-active').value, loc: campSelect.value,
            time: now.toLocaleString('zh-TW', {hour12:false})
        };

        let logs = JSON.parse(localStorage.getItem('camp-logs') || '[]');
        logs.unshift(log);
        localStorage.setItem('camp-logs', JSON.stringify(logs));

        let campData = JSON.parse(localStorage.getItem('camp-cd-timestamps') || '{}');
        campData[log.loc] = now.toISOString();
        localStorage.setItem('camp-cd-timestamps', JSON.stringify(campData));

        renderLogs();
        updateCampSelect();
        alert(`${log.loc} 登記成功！`);
    }

    function renderLogs() {
        const container = document.getElementById('log-list');
        const tableBody = document.getElementById('log-table-body');
        const logs = JSON.parse(localStorage.getItem('camp-logs') || '[]');
        tableBody.innerHTML = logs.map(l => `<tr><td style="color:var(--header-color); font-size:0.75rem;">${l.time.split(' ')[1]}</td><td style="font-weight:bold;">${l.name}</td><td style="color:var(--accent-color);">${l.loc}</td><td>${l.power}/${l.active}</td></tr>`).join('');
        container.innerHTML = logs.map((l, index) => `
            <div class="log-card">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:8px;">
                    <span style="font-size:1.1rem; font-weight:bold; color:var(--accent-color);">${l.name}</span>
                    <span style="font-size:0.75rem; color:var(--header-color);">${l.time}</span>
                </div>
                <div class="log-grid">
                    <span class="log-tag">✨ ${l.quality}</span><span class="log-tag">⚔️ ${l.type}</span>
                    <span class="log-tag">🔋 異能: ${l.power}</span><span class="log-tag">🌀 活力: ${l.active}</span>
                    <span class="log-tag" style="grid-column: span 2;">📍 地點: ${l.loc}</span>
                </div>
                <div style="text-align:right; margin-top:10px;">
                    <button onclick="deleteLog(${index})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.8rem;">[ 移除此紀錄 ]</button>
                </div>
            </div>`).join('');
    }

    function deleteLog(index) {
        if(!confirm("確定要刪除這條紀錄嗎？")) return;
        let logs = JSON.parse(localStorage.getItem('camp-logs') || '[]');
        const deletedLog = logs[index];
        const deletedCamp = deletedLog.loc;

        logs.splice(index, 1);
        localStorage.setItem('camp-logs', JSON.stringify(logs));

        const hasOtherLogForCamp = logs.some(log => normalizeCampName(log.loc) === normalizeCampName(deletedCamp));
        if (!hasOtherLogForCamp) {
            let cdTimestamps = JSON.parse(localStorage.getItem('camp-cd-timestamps') || '{}');
            const targetKey = Object.keys(cdTimestamps).find(key => normalizeCampName(key) === normalizeCampName(deletedCamp));
            if (targetKey) {
                delete cdTimestamps[targetKey];
                localStorage.setItem('camp-cd-timestamps', JSON.stringify(cdTimestamps));
            }
        }

        renderLogs(); 
        updateCampSelect();
    }

    function resetList() {
        if(confirm("確定重置所有核取方塊與重要週常 CD 嗎？")) {
            localStorage.removeItem('weekly-cd-v2');
            document.querySelectorAll('input[type="checkbox"]').forEach(box => box.checked = false);
            currentRandomTask = getRandomTask();
            updateWeeklyDisplay();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        showWelcomeMessage();
        initDevSelect();
        renderLogs();
        updateCampSelect();
        weeklyInterval = setInterval(updateWeeklyDisplay, 1000);
    });
</script>
</body>
</html>
